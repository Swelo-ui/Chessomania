<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Game Review</title>
<style>
/* ═══════════════════════════════════════════
   ChessOmania Review – Complete Rebuild v4
   All bugs fixed: eval bar, best move,
   accuracy, classification, timer, spacing
═══════════════════════════════════════════ */
:root {
  --bg:         #161512;
  --panel:      #1e1c19;
  --panel2:     #272421;
  --border:     #3a3630;
  --accent:     #b58863;
  --accent2:    #8d6840;
  --green:      #629924;
  --red:        #c94f36;
  --text:       #d9d4cd;
  --text2:      #8a8178;
  --sq-l:       #f0d9b5;
  --sq-d:       #b58863;
  --board-size: min(370px, 90vw);
}
*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  font-size:14px;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Scrollable area */
#content{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:10px 10px 28px;
  -webkit-overflow-scrolling:touch;
}

/* ── Status / Timer / Progress ── */
#status-bar{
  display:none;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:8px;
  padding:9px 12px;
  margin-bottom:14px;   /* clear gap below progress bar */
}
#status-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}
#status-msg{
  font-size:0.7rem;
  color:var(--text2);
  font-weight:600;
}
#timer-wrap{
  display:flex;
  align-items:center;
  gap:5px;
}
#timer-icon{font-size:0.75rem;}
#timer-val{
  font-size:0.72rem;
  font-weight:700;
  color:var(--accent);
  font-variant-numeric:tabular-nums;
  min-width:38px;
  text-align:right;
}
#timer-eta{
  font-size:0.66rem;
  color:var(--text2);
}
#prog-track{
  height:4px;
  background:var(--panel2);
  border-radius:2px;
  overflow:hidden;
}
#prog-fill{
  height:100%;
  background:var(--accent);
  width:0%;
  transition:width 0.3s ease;
  border-radius:2px;
}

/* Error banner */
#error-banner{
  display:none;
  background:rgba(201,79,54,0.12);
  border:1px solid rgba(201,79,54,0.35);
  border-radius:8px;
  padding:8px 12px;
  font-size:0.72rem;
  color:#f97316;
  margin-bottom:10px;
  text-align:center;
}

/* ── Board container ── */
.board-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:12px;
}

/* Eval bar – horizontal strip above board */
.eval-row{
  width:var(--board-size);
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;  /* gap between eval bar and board */
}
#eval-score{
  font-size:0.92rem;
  font-weight:800;
  min-width:52px;
  text-align:center;
  color:var(--text);
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.3px;
  white-space:nowrap;
}
.eval-track{
  flex:1;
  height:8px;
  background:#1a1916;
  border-radius:4px;
  overflow:hidden;
  border:1px solid var(--border);
  position:relative;
}
#eval-fill{
  height:100%;
  /* White portion from the left */
  background:#e8e4df;
  width:50%;
  transition:width 0.45s cubic-bezier(.4,0,.2,1);
  border-radius:3px 0 0 3px;
}

/* Board with rank/file labels */
.board-wrap{display:flex;align-items:flex-start;}
.rank-labels{
  display:flex;
  flex-direction:column;
  height:var(--board-size);
  margin-right:4px;
  color:var(--text2);
  font-size:0.58rem;
  font-weight:700;
  user-select:none;
}
.rank-labels span{flex:1;display:flex;align-items:center;justify-content:center;}
.board-col{display:flex;flex-direction:column;}
#chessboard{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:var(--board-size);
  height:var(--board-size);
  border-radius:3px;
  overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.75);
}
.file-labels{
  display:flex;
  width:var(--board-size);
  margin-top:4px;
  color:var(--text2);
  font-size:0.58rem;
  font-weight:700;
  user-select:none;
}
.file-labels span{flex:1;display:flex;align-items:center;justify-content:center;}

/* Squares */
.sq{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.sq.light{background:var(--sq-l);}
.sq.dark {background:var(--sq-d);}
.sq.lf   {background:rgba(205,210,20,.4) !important;}
.sq.lt   {background:rgba(205,210,20,.55) !important;}
.sq.bf   {background:rgba(20,160,240,.22) !important;
          outline:2px dashed rgba(20,160,240,.85);
          outline-offset:-2px;}
.sq.bt   {background:rgba(20,160,240,.32) !important;
          outline:2px solid rgba(20,160,240,.9);
          outline-offset:-2px;}
.sq.selected-sq {background:rgba(181,136,99,0.6) !important;
                 outline:3px solid rgba(181,136,99,0.9);
                 outline-offset:-3px;}
.sq.dest-sq::after{content:'';
                   width:14px;height:14px;
                   background:rgba(0,0,0,0.18);
                   border-radius:50%;
                   position:absolute;
                   pointer-events:none;}

/* Piece images */
.piece{
  width:86%;
  height:86%;
  object-fit:contain;
  pointer-events:none;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));
  -webkit-user-drag:none;
}

/* Nav buttons */
.nav-row{
  display:flex;
  gap:6px;
  margin:10px 0 8px;
  justify-content:center;
}
.btn{
  padding:7px 13px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  cursor:pointer;
  font-size:0.8rem;
  font-weight:600;
  transition:filter 0.12s,transform 0.08s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.btn:active{filter:brightness(1.35);transform:scale(0.94);}
.btn-accent{background:var(--accent);border-color:var(--accent2);color:#fff;}

/* Eval graph */
.graph-wrap{
  width:var(--board-size);
  height:68px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:7px;
  overflow:hidden;
  position:relative;
}
.graph-wrap svg{width:100%;height:100%;display:block;}
.g-dot{cursor:pointer;}

/* Cards */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:10px;
  overflow:hidden;
}
.card-head{
  padding:6px 12px;
  font-size:0.62rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--text2);
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.018);
}
.card-body{padding:11px 12px;}

/* Classification pill */
.cls-pill{
  display:inline-block;
  padding:2px 10px;
  border-radius:20px;
  font-size:0.68rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.7px;
  margin-bottom:6px;
}
.cls-best,.cls-forced{background:#629924;color:#fff;}
.cls-excellent{background:#38bdf8;color:#fff;}
.cls-good{background:#9ca3af;color:#fff;}
.cls-inaccuracy{background:#fbbf24;color:#1e1c19;}
.cls-mistake{background:#f97316;color:#fff;}
.cls-blunder{background:#ef4444;color:#fff;}
.cls-brilliant{background:#12b6ad;color:#fff;}
.cls-missed{background:#ff7043;color:#fff;}

/* Accuracy boxes */
.acc-row{display:flex;gap:10px;margin-bottom:11px;}
.acc-box{
  flex:1;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.acc-val{
  font-size:1.45rem;
  font-weight:800;
  color:var(--green);
  font-variant-numeric:tabular-nums;
  line-height:1;
}
.acc-lbl{font-size:0.58rem;color:var(--text2);text-transform:uppercase;letter-spacing:.9px;}

/* Summary table */
.sum-tbl{width:100%;border-collapse:collapse;font-size:0.72rem;}
.sum-tbl th,.sum-tbl td{padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.04);}
.sum-tbl th{color:var(--text2);font-size:0.62rem;text-transform:uppercase;letter-spacing:.5px;font-weight:600;text-align:left;}
.sum-tbl td:nth-child(2),.sum-tbl td:nth-child(3){text-align:center;font-weight:600;}

/* Move list */
.mlist{max-height:175px;overflow-y:auto;}
.mrow{display:flex;align-items:center;padding:4px 6px;font-size:0.74rem;border-bottom:1px solid rgba(255,255,255,.025);}
.mrow.active{background:rgba(181,136,99,.12);}
.mnum{width:28px;color:var(--text2);font-weight:700;flex-shrink:0;font-size:0.68rem;}
.msan{
  flex:1;
  display:flex;
  align-items:center;
  padding:2px 4px;
  border-radius:4px;
  min-height:20px;
  cursor:pointer;
  gap:3px;
  -webkit-tap-highlight-color:transparent;
}
.msan:active{background:rgba(255,255,255,.08);}
.msan.cur{background:var(--accent);color:#fff;}

/* Move badges */
.mbadge{
  display:inline-flex;align-items:center;justify-content:center;
  width:13px;height:13px;border-radius:50%;
  font-size:0.42rem;font-weight:900;
  color:#fff;flex-shrink:0;line-height:1;
}
.mb-best,.mb-forced{background:#629924;}
.mb-excellent{background:#38bdf8;}
.mb-good{background:#9ca3af;}
.mb-inaccuracy{background:#fbbf24;color:#1e1c19;}
.mb-mistake{background:#f97316;}
.mb-blunder{background:#ef4444;}
.mb-brilliant{background:#12b6ad;}
.mb-missed{background:#ff7043;}
</style>
</head>
<body>

<div id="content">

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Practice banner -->
  <div id="practice-banner" style="display:none;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.35);border-radius:8px;padding:9px 12px;margin-bottom:10px;text-align:center;">
    <span style="font-size:0.75rem;font-weight:700;color:#38bdf8;margin-right:8px;">Practice Mode: Explore variations</span>
    <button class="btn btn-accent" style="padding:4px 9px;font-size:0.68rem;" onclick="exitPractice()">Return to Review</button>
  </div>

  <!-- Progress & Timer (with clear gap below) -->
  <div id="status-bar">
    <div id="status-row">
      <span id="status-msg">Initializing engine…</span>
      <div id="timer-wrap">
        <span id="timer-icon">⏱</span>
        <span id="timer-val">0:00</span>

      </div>
    </div>
    <div id="prog-track"><div id="prog-fill"></div></div>

  <!-- Board area -->
  <div class="board-container">

    <!-- Eval bar -->

    <!-- Navigation -->

      <button class="btn" onclick="jumpStart()">«</button>
      <button class="btn" onclick="prevMove()">‹</button>
      <button class="btn" onclick="nextMove()">›</button>
      <button class="btn" onclick="jumpEnd()">»</button>
      <button class="btn" onclick="flipBoard()">⇅</button>

    <!-- Eval graph -->
    <div class="graph-wrap">
      <svg id="graph-svg" viewBox="0 0 320 68" preserveAspectRatio="none"></svg>
    </div>

  </div>

  <!-- Move Quality -->
  <div class="card">
    <div class="card-head">Move Quality</div>
    <div class="card-body">
      <div id="cls-row" style="display:none;margin-bottom:6px;"></div>
      <div id="played-san" style="font-weight:700;font-size:0.82rem;margin-bottom:3px;">—</div>
      <div id="played-eval" style="font-size:0.71rem;color:var(--text2);margin-bottom:9px;">Select a move to see details.</div>
      <div id="best-san" style="font-weight:700;font-size:0.78rem;color:#38bdf8;margin-bottom:2px;">—</div>
      <div id="best-eval" style="font-size:0.68rem;color:var(--text2);margin-bottom:10px;"></div>
      <button class="btn btn-accent" id="btn-best" style="width:100%;display:none;" onclick="toggleBest()">Show Best Move</button>
    </div>
  </div>

  <!-- Review Report -->
  <div class="card">
    <div class="card-head">Review Report</div>
    <div class="card-body">
      <div class="acc-row">
        <div class="acc-box">
          <div class="acc-val" id="acc-w">—</div>
          <div class="acc-lbl">⬜ White</div>
        </div>
        <div class="acc-box">
          <div class="acc-val" id="acc-b">—</div>

      <table class="sum-tbl">
        <thead><tr><th>Type</th><th>White</th><th>Black</th></tr></thead>
        <tbody>
          <tr><td style="color:#12b6ad;font-weight:700">Brilliant</td><td id="s-bril-w">—</td><td id="s-bril-b">—</td></tr>
          <tr><td>Best / Forced</td><td id="s-best-w">—</td><td id="s-best-b">—</td></tr>
          <tr><td>Excellent</td><td id="s-exc-w">—</td><td id="s-exc-b">—</td></tr>
          <tr><td>Good</td><td id="s-gd-w">—</td><td id="s-gd-b">—</td></tr>
          <tr><td style="color:#fbbf24">Inaccuracy</td><td id="s-inac-w">—</td><td id="s-inac-b">—</td></tr>
          <tr><td style="color:#f97316">Mistake</td><td id="s-mist-w">—</td><td id="s-mist-b">—</td></tr>
          <tr><td style="color:#ef4444;font-weight:700">Blunder</td><td id="s-blun-w">—</td><td id="s-blun-b">—</td></tr>

</div><!-- /content -->

<script src="chess.min.js"></script>
<script>
'use strict';

const FILES = ['a','b','c','d','e','f','g','h'];
const RANKS = [8,7,6,5,4,3,2,1];

/* ─── State ─── */
let chess     = new Chess();
let hist      = [];      // SAN moves
let uciMoves  = [];      // UCI moves (parallel to hist)
let fens      = [];      // FEN string at each position index
let evals     = [];      // eval result at each FEN index
let clsArr    = [];      // classification per hist move
let flipped   = false;
let showBest  = false;
let moveIdx   = 0;
let lastMove  = null;
let pTheme    = 'cburnett';
let analyzing = false;
let selectedSq = null;
let practiceMode = false;
let practiceChess = null;

/* ── Workers ── */
const WORKERS   = 3;
let sfW         = [];   // worker instances
let sfReady     = [];   // ready flags
let blobURL     = null;

/* ── Timer ── */
let timerInt    = null;
let tStart      = 0;

/* ─── Android bridge ─── */
function android(fn, ...a) {
  if (window.Android && typeof window.Android[fn] === 'function') {
    try { window.Android[fn](...a); } catch(e) {}
  }
}

/* ─── Sound & Haptic Helpers ─── */
const sfxCache = {};
function snd(name) {
  const theme = 'standard';
  const k = theme + '/' + name;
  if (!sfxCache[k]) {
    let folder = (name === 'Check' || name === 'Checkmate') ? 'sfx' : 'standard';
    const a = new Audio('sounds/' + folder + '/' + name + '.mp3');
    a.volume = 0.7;
    sfxCache[k] = a;
  }
  sfxCache[k].currentTime = 0;
  sfxCache[k].play().catch(() => {});
}

function haptic(type) {
  if (window.Android && typeof window.Android.vibrate === 'function') {
    try {
      if (type === 'blunder') {
        window.Android.vibrate(250);
      } else if (type === 'mistake') {
        window.Android.vibrate(100);
      } else if (type === 'inaccuracy') {
        window.Android.vibrate(55);
      } else if (type === 'brilliant') {
        window.Android.vibrate(80);
        setTimeout(() => window.Android.vibrate(80), 180);
      } else if (type === 'missed') {
        window.Android.vibrate(120);
      } else if (type === 'best' || type === 'excellent' || type === 'forced') {
        window.Android.vibrate(35);
      }
    } catch(e) {}
  }
}

/* ─── Timer ─── */
function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec) % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function startTimer() {
  tStart = Date.now();
  document.getElementById('timer-val').textContent = '0:00';
  document.getElementById('timer-eta').textContent = '';
  timerInt = setInterval(() => {
    const elapsed = (Date.now() - tStart) / 1000;
    document.getElementById('timer-val').textContent = fmtTime(elapsed);

    // ETA estimate from progress
    const pct = parseFloat(document.getElementById('prog-fill').style.width) || 0;
    if (pct > 8 && pct < 98) {
      const total = elapsed / (pct / 100);
      const rem   = Math.max(0, total - elapsed);
      document.getElementById('timer-eta').textContent = '· ~' + fmtTime(rem) + ' left';
    } else {
      document.getElementById('timer-eta').textContent = '';
    }
  }, 500);
}

function stopTimer() {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
}

/* ─── Progress UI ─── */
function setProgress(visible, msg, pct) {
  document.getElementById('status-bar').style.display = visible ? 'block' : 'none';
  if (msg !== null) document.getElementById('status-msg').textContent = msg;
  if (pct !== null) document.getElementById('prog-fill').style.width = pct + '%';
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
  android('onError', msg);
}

/* ─── IndexedDB cache v4 ─── */
let _db = null;
async function openDB() {
  if (_db) return _db;
  return new Promise(res => {
    const r = indexedDB.open('ChessReview_v4', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('ev');
    r.onsuccess = e => { _db = e.target.result; res(_db); };
    r.onerror   = () => res(null);
  });
}
async function cacheGet(k) {
  const d = await openDB(); if (!d) return null;
  return new Promise(res => {
    try {
      const rq = d.transaction('ev','readonly').objectStore('ev').get(k);
      rq.onsuccess = () => res(rq.result || null);
      rq.onerror   = () => res(null);
    } catch { res(null); }
  });
}
async function cacheSet(k, v) {
  const d = await openDB(); if (!d) return;
  return new Promise(res => {
    try {
      const rq = d.transaction('ev','readwrite').objectStore('ev').put(v, k);
      rq.onsuccess = () => res(true);
      rq.onerror   = () => res(false);
    } catch { res(false); }
  });
}

/* ─── Stockfish worker init ─── */
async function initWorkers() {
  if (sfW.length) return;
  try {
    const code = await fetch('stockfish.js').then(r => r.text());
    const pfx  = 'https://appassets.androidplatform.net/assets/';
    const blob = new Blob([
      `self.Module={locateFile:function(p){return "${pfx}"+p;}};\n` + code
    ], { type: 'application/javascript' });
    blobURL = URL.createObjectURL(blob);

    for (let i = 0; i < WORKERS; i++) {
      const w = new Worker(blobURL);
      sfReady.push(false);
      const idx = i;
      w.addEventListener('message', function rdy(e) {
        if (e.data === 'readyok') {
          sfReady[idx] = true;
          w.removeEventListener('message', rdy);
        }
      });
      w.onerror = e => console.warn('SF worker error:', e.message);
      w.postMessage('uci');
      w.postMessage('setoption name Hash value 16');
      w.postMessage('setoption name Threads value 1');
      w.postMessage('isready');
      sfW.push(w);
    }
  } catch(e) {
    console.error('Worker init failed:', e);
    showError('Chess engine unavailable — board view only.');
  }
}

/* ─── Single position evaluation ─── */
function evalPos(worker, fen, depth) {
  return new Promise(res => {
    let cp = 0, mate = null, best = '(none)';
    const tid = setTimeout(() => {
      worker.removeEventListener('message', h);
      res({ cp, mate, bestMove: best });
    }, 10000);

    function h(e) {
      const ln = e.data;
      const cm = ln.match(/score cp (-?\d+)/);
      const mm = ln.match(/score mate (-?\d+)/);
      if (cm) cp   = parseInt(cm[1]);
      if (mm) mate = parseInt(mm[1]);
      if (ln.startsWith('bestmove')) {
        clearTimeout(tid);
        best = ln.split(' ')[1] || '(none)';
        worker.removeEventListener('message', h);
        res({ cp, mate, bestMove: best });
      }
    }
    worker.addEventListener('message', h);
    worker.postMessage('position fen ' + fen);
    worker.postMessage('go depth ' + depth);
  });
}

/* ═══════════════════════
   Entry point from Android
═══════════════════════ */
window.startReview = async function(b64moves, pieceTheme, lightColor, darkColor) {
  try {
    if (pieceTheme) pTheme = pieceTheme;
    if (lightColor) document.documentElement.style.setProperty('--sq-l', lightColor);
    if (darkColor)  document.documentElement.style.setProperty('--sq-d', darkColor);

    const raw = atob(b64moves).split(',').map(s => s.trim()).filter(Boolean);

    // Build hist, uciMoves, fens
    const tmp = new Chess();
    hist = []; uciMoves = []; fens = [tmp.fen()];
    for (const m of raw) {
      const r = tmp.move(m);
      if (!r) break;
      hist.push(r.san);
      uciMoves.push(r.from + r.to + (r.promotion || ''));
      fens.push(tmp.fen());
    }

    if (!hist.length) { showError('No valid moves to review.'); renderBoard(); return; }

    moveIdx = hist.length;
    rebuildBoard(moveIdx);
    renderBoard();
    updMoveList();
    updEvalBar();

    await runAnalysis();
  } catch(e) {
    showError('startReview error: ' + e.message);
    renderBoard();
  }
};

/* ═══════════════════
   Analysis pipeline
═══════════════════ */
async function runAnalysis() {
  if (analyzing) return;
  analyzing = true; showBest = false;

  try {
    setProgress(true, 'Checking cache…', 2);

    const cacheKey = hist.join(',') + '_v4';
    const cached   = await cacheGet(cacheKey);
    if (cached && cached.evals?.length === fens.length && cached.clsArr?.length === hist.length) {
      evals   = cached.evals;
      clsArr  = cached.clsArr;
      analyzing = false;
      setProgress(false, null, 100);
      calcStats(); drawGraph(); render();
      android('onAnalysisComplete');
      return;
    }

    // Fresh analysis
    startTimer();
    setProgress(true, 'Loading engine…', 3);
    await initWorkers();

    // Wait up to 2 s for at least 1 worker
    const deadline = Date.now() + 2000;
    while (!sfReady.some(Boolean) && sfW.length && Date.now() < deadline)
      await sleep(100);

    if (!sfW.length) {
      stopTimer(); analyzing = false;
      setProgress(false, null, 0);
      render(); return;
    }

    // ── Precompute forced flags ──
    const forced = fens.map((fen, i) => {
      if (i >= hist.length) return false;
      return new Chess(fen).moves().length === 1;
    });

    evals = new Array(fens.length).fill(null);

    // Fill game-over positions immediately (no engine needed)
    for (let i = 0; i < fens.length; i++) {
      const t = new Chess(fens[i]);
      if (t.game_over()) {
        // From White's perspective: if it's White's turn and checkmate → White is mated = -∞
        evals[i] = {
          cp: t.in_checkmate() ? (t.turn() === 'w' ? -30000 : 30000) : 0,
          mate: null,
          bestMove: '(none)',
          fixedWhite: true  // already in White perspective, skip toWhite inversion
        };
      }
    }

    // ── Pass 1: depth 8, all non-terminal positions ──
    const pass1 = fens.map((fen, i) => evals[i] ? null : { fen, i }).filter(Boolean);
    let done1 = fens.length - pass1.length;
    let nxt1  = 0;

    await Promise.all(sfW.map(async w => {
      while (nxt1 < pass1.length) {
        const task = pass1[nxt1++];
        evals[task.i] = await evalPos(w, task.fen, 8);
        done1++;
        setProgress(true,
          `Analyzing ${done1} / ${fens.length}`,
          Math.round(done1 / fens.length * 78));
      }
    }));

    // ── Pass 2: depth 12 for critical moves ──
    const seen = new Set();
    const pass2 = [];
    for (let i = 0; i < hist.length; i++) {
      if (!evals[i] || !evals[i+1]) continue;
      const turn = turnAt(i);
      const wB   = toWhite(evals[i],   turn);
      const wA   = toWhite(evals[i+1], turn === 'w' ? 'b' : 'w');
      const pB   = turn === 'w' ? wB : -wB;
      const pA   = turn === 'w' ? wA : -wA;
      const loss = pB - pA;
      const flip = (pB >= 150 && pA <= 50) || (pB > 0 && pA <= -100);

      // Re-evaluate only critical blunder/eval-flip/mate threat swings
      if ((loss > 200 || flip || evals[i].mate !== null || evals[i+1].mate !== null) && !forced[i]) {
        [i, i+1].forEach(idx => {
          if (!seen.has(idx) && idx < fens.length && !(new Chess(fens[idx]).game_over())) {
            seen.add(idx); pass2.push({ fen: fens[idx], i: idx });
          }
        });
      }
    }

    let done2 = 0, nxt2 = 0;
    if (pass2.length) {
      setProgress(true, `Refining ${pass2.length} critical positions…`, 80);
      await Promise.all(sfW.map(async w => {
        while (nxt2 < pass2.length) {
          const task = pass2[nxt2++];
          evals[task.i] = await evalPos(w, task.fen, 12);
          done2++;
          setProgress(true,
            `Refining ${done2} / ${pass2.length}…`,
            80 + Math.round(done2 / pass2.length * 18));
        }
      }));
    }

    // ── Classify moves ──
    clsArr = hist.map((_, i) => {
      if (!evals[i] || !evals[i+1]) return 'good';
      return classifyMove(i, forced[i]);
    });

    await cacheSet(cacheKey, { evals, clsArr });

    stopTimer();
    analyzing = false;
    setProgress(false, null, 100);
    calcStats(); drawGraph(); render();
    android('onAnalysisComplete');

  } catch(err) {
    stopTimer();
    analyzing = false;
    setProgress(false, null, 0);
    showError('Analysis failed: ' + err.message);
    render();
  }
}

/* ─── Eval normalization ─── */
function toWhite(ev, turn) {
  if (!ev) return 0;
  if (ev.fixedWhite) return ev.cp;

  let val;
  if (ev.mate !== null) {
    val = ev.mate > 0 ? (30000 - ev.mate * 10) : (-30000 - ev.mate * 10);
  } else {
    val = Math.max(-3000, Math.min(3000, ev.cp));
  }
  return turn === 'w' ? val : -val;
}

function turnAt(i) {
  if (fens[i]) return fens[i].split(' ')[1] || (i % 2 === 0 ? 'w' : 'b');
  return i % 2 === 0 ? 'w' : 'b';
}

/* ─── Material value mapping ─── */
function getMaterialValue(fen) {
  const t = new Chess(fen);
  let wVal = 0, bVal = 0;
  for (let ri = 0; ri < 8; ri++) {
    for (let fi = 0; fi < 8; fi++) {
      const sq = FILES[fi] + RANKS[ri];
      const p = t.get(sq);
      if (p) {
        let val = 100;
        if (p.type === 'n') val = 300;
        else if (p.type === 'b') val = 320;
        else if (p.type === 'r') val = 500;
        else if (p.type === 'q') val = 900;
        
        if (p.color === 'w') wVal += val;
        else bVal += val;
      }
    }
  }
  return { wVal, bVal };
}

/* ─── Move classification ─── */
function classifyMove(i, forced) {
  if (forced) return 'forced';

  const played = uciMoves[i];
  const best   = evals[i]?.bestMove;
  
  const turn  = turnAt(i);
  const nextT = turn === 'w' ? 'b' : 'w';
  const wBef  = toWhite(evals[i],   turn);
  const wAft  = toWhite(evals[i+1], nextT);

  const pBef  = turn === 'w' ? wBef : -wBef;
  const pAft  = turn === 'w' ? wAft : -wAft;
  const loss  = pBef - pAft;

  // 1. Brilliant move detection (!!)
  if (played && best && (played === best || loss <= 10) && pAft >= -100) {
    const matBef = getMaterialValue(fens[i]);
    const matAft = getMaterialValue(fens[i+1]);
    const matDiff = turn === 'w' ? 
      (matBef.wVal - matBef.bVal) - (matAft.wVal - matAft.bVal) :
      (matBef.bVal - matBef.wVal) - (matAft.bVal - matAft.wVal);
    if (matDiff < 0) {
      return 'brilliant';
    }
  }

  // 2. Missed Win detection (miss)
  const hadMate = evals[i]?.mate !== null && ((turn === 'w' && evals[i].mate > 0) || (turn === 'b' && evals[i].mate < 0));
  if ((pBef >= 250 || hadMate) && loss > 150 && pAft < 150) {
    return 'missed';
  }

  if (played && best && played === best) return 'best';
  if (loss <= 0) return 'best';

  const flip = (pBef >= 150 && pAft <= 50) || (pBef > 0 && pAft <= -100);
  if (loss > 300 || flip) return 'blunder';
  if (loss > 100)          return 'mistake';
  if (loss > 50)           return 'inaccuracy';
  if (loss > 15)           return 'good';
  return 'excellent';
}

/* ─── Stats + Accuracy ─── */
function calcStats() {
  const init = () => ({
    brilliant:0,best:0,excellent:0,good:0,inaccuracy:0,mistake:0,blunder:0,forced:0,missed:0,
    lossSum:0,cnt:0
  });
  const s = { w: init(), b: init() };

  for (let i = 0; i < hist.length; i++) {
    const cls  = clsArr[i] || 'good';
    const turn = turnAt(i);
    const t    = s[turn];
    t.cnt++;
    t[cls] = (t[cls] || 0) + 1;

    if (cls !== 'forced' && evals[i] && evals[i+1] &&
        evals[i].mate === null && evals[i+1].mate === null &&
        !evals[i].fixedWhite && !evals[i+1].fixedWhite) {
      const nextT = turn === 'w' ? 'b' : 'w';
      const wB    = toWhite(evals[i],   turn);
      const wA    = toWhite(evals[i+1], nextT);
      const pB    = Math.max(-700, Math.min(700, turn === 'w' ? wB : -wB));
      const pA    = Math.max(-700, Math.min(700, turn === 'w' ? wA : -wA));
      t.lossSum  += Math.max(0, pB - pA);
    }
  }

  function acplToAcc(acpl) {
    return Math.max(0, Math.min(100,
      Math.round(103.1668 * Math.exp(-0.04354 * (acpl * 0.6)) - 3.1669)
    ));
  }

  const acplW = s.w.cnt > 0 ? s.w.lossSum / s.w.cnt : 0;
  const acplB = s.b.cnt > 0 ? s.b.lossSum / s.b.cnt : 0;
  const accW  = s.w.cnt > 0 ? acplToAcc(acplW) : null;
  const accB  = s.b.cnt > 0 ? acplToAcc(acplB) : null;

  function accColor(v) {
    if (v >= 90) return '#629924';
    if (v >= 75) return '#38bdf8';
    if (v >= 55) return '#fbbf24';
    return '#ef4444';
  }

  const wEl = document.getElementById('acc-w');
  const bEl = document.getElementById('acc-b');
  if (accW !== null) { wEl.textContent = accW + '%'; wEl.style.color = accColor(accW); }
  if (accB !== null) { bEl.textContent = accB + '%'; bEl.style.color = accColor(accB); }

  const set = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  set('s-bril-w',  s.w.brilliant);       set('s-bril-b',  s.b.brilliant);
  set('s-best-w',  s.w.best+s.w.forced); set('s-best-b',  s.b.best+s.b.forced);
  set('s-exc-w',   s.w.excellent);       set('s-exc-b',   s.b.excellent);
  set('s-gd-w',    s.w.good);            set('s-gd-b',    s.b.good);
  set('s-inac-w',  s.w.inaccuracy);      set('s-inac-b',  s.b.inaccuracy);
  set('s-mist-w',  s.w.mistake);         set('s-mist-b',  s.b.mistake);
  set('s-blun-w',  s.w.blunder);         set('s-blun-b',  s.b.blunder);
  set('s-miss-w',  s.w.missed);          set('s-miss-b',  s.b.missed);
}

/* ─── Eval graph ─── */
function drawGraph() {
  const svg = document.getElementById('graph-svg');
  if (!evals.length) { svg.innerHTML = ''; return; }

  const W = 320, H = 68, mid = H / 2;
  const N = evals.length - 1;

  const pts = evals.map((ev, i) => {
    const x   = N === 0 ? W/2 : (i/N) * (W-20) + 10;
    if (!ev) return { x, y: mid };
    const wv  = toWhite(ev, turnAt(i)) / 100;
    const val = Math.max(-8, Math.min(8, wv));
    const y   = mid - (val / 8) * (mid - 5);
    return { x, y };
  });

  let html = '';
  // Center line
  html += `<line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;

  // Shaded fill area
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i+1];
    const avgY = (a.y + b.y) / 2;
    const col  = avgY < mid ? 'rgba(98,153,36,.18)' : 'rgba(201,79,54,.18)';
    html += `<polygon points="${a.x},${a.y} ${b.x},${b.y} ${b.x},${mid} ${a.x},${mid}" fill="${col}"/>`;
  }

  // Line
  if (pts.length > 1) {
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
    html += `<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linejoin="round"/>`;
  }

  // Dots
  pts.forEach((p, i) => {
    const active = i === moveIdx;
    html += `<circle cx="${p.x}" cy="${p.y}"
               r="${active ? 5 : 3}"
               fill="${active ? '#fff' : 'var(--accent)'}"
               stroke="${active ? 'var(--green)' : 'rgba(255,255,255,.25)'}"
               stroke-width="${active ? 2 : 1}"
               class="g-dot" onclick="jumpTo(${i})"/>`;
  });

  svg.innerHTML = html;
}

/* ─── Board rendering ─── */
function rebuildBoard(toIdx) {
  chess = new Chess();
  for (let i = 0; i < toIdx; i++) chess.move(hist[i]);
}

function renderBoard() {
  const board = document.getElementById('chessboard');
  board.innerHTML = '';

  const dR = flipped ? [...RANKS].reverse() : RANKS;
  const dF = flipped ? [...FILES].reverse() : FILES;

  document.getElementById('rank-labels').innerHTML = dR.map(r => `<span>${r}</span>`).join('');
  document.getElementById('file-labels').innerHTML = dF.map(f => `<span>${f}</span>`).join('');

  let bFrom = null, bTo = null;
  if (showBest && moveIdx > 0 && evals[moveIdx - 1]) {
    const bm = evals[moveIdx - 1].bestMove;
    if (bm && bm !== '(none)' && bm.length >= 4) {
      bFrom = bm.slice(0, 2);
      bTo   = bm.slice(2, 4);
    }
  }

  const currentChess = practiceMode ? practiceChess : chess;
  const legalMovesFromSelected = selectedSq ? currentChess.moves({ square: selectedSq, verbose: true }) : [];
  const destSquares = legalMovesFromSelected.map(m => m.to);

  for (let ri = 0; ri < 8; ri++) {
    for (let fi = 0; fi < 8; fi++) {
      const file = dF[fi], rank = dR[ri], sq = file + rank;
      const piece = currentChess.get(sq);
      const isL   = (FILES.indexOf(file) + rank) % 2 === 1;

      const div = document.createElement('div');
      div.className = 'sq ' + (isL ? 'light' : 'dark');
      div.dataset.sq = sq;

      if (lastMove?.from === sq) div.classList.add('lf');
      if (lastMove?.to   === sq) div.classList.add('lt');
      if (bFrom === sq) div.classList.add('bf');
      if (bTo   === sq) div.classList.add('bt');

      if (selectedSq === sq) div.classList.add('selected-sq');
      if (destSquares.includes(sq)) div.classList.add('dest-sq');

      if (piece) {
        const img = document.createElement('img');
        img.src       = `pieces/${pTheme}/${piece.color}${piece.type.toUpperCase()}.svg`;
        img.className = 'piece';
        img.draggable = false;
        img.onerror   = () => { img.style.display = 'none'; };
        div.appendChild(img);
      }
      board.appendChild(div);
    }
  }
}

/* ─── Eval bar update ─── */
function updEvalBar() {
  if (practiceMode) return;
  const scoreEl = document.getElementById('eval-score');
  const fillEl  = document.getElementById('eval-fill');

  const tmp = new Chess();
  for (let i = 0; i < moveIdx; i++) tmp.move(hist[i]);

  if (tmp.game_over()) {
    if (tmp.in_checkmate()) {
      const whiteLost = tmp.turn() === 'w';
      fillEl.style.width  = whiteLost ? '2%' : '98%';
      scoreEl.textContent = whiteLost ? '0-1' : '1-0';
      scoreEl.style.color = whiteLost ? '#8a8178' : '#f0d9b5';
    } else {
      fillEl.style.width  = '50%';
      scoreEl.textContent = '½-½';
      scoreEl.style.color = 'var(--text)';
    }
    return;
  }

  const ev = evals[moveIdx];
  if (!ev) {
    fillEl.style.width  = '50%';
    scoreEl.textContent = '+0.0';
    scoreEl.style.color = 'var(--text)';
    return;
  }

  const turn    = tmp.turn();
  const wVal    = toWhite(ev, turn);

  let pct, txt;

  if (ev.mate !== null) {
    const wMating = wVal > 0;
    pct = wMating ? 96 : 4;
    const mN = Math.abs(ev.mate);
    txt = wMating ? `M+${mN}` : `M-${mN}`;
    scoreEl.style.color = wMating ? '#f0d9b5' : '#8a8178';
  } else {
    const clampedCp = Math.max(-800, Math.min(800, wVal));
    pct = Math.max(4, Math.min(96, 50 + (clampedCp / 800) * 46));
    const v = wVal / 100;
    txt = (v >= 0 ? '+' : '') + v.toFixed(1);
    scoreEl.style.color = wVal >= 0 ? '#f0d9b5' : '#9a9590';
  }

  fillEl.style.width  = pct + '%';
  scoreEl.textContent = txt;
}

/* ─── Move quality panel ─── */
function updQualityPanel() {
  const clsRow   = document.getElementById('cls-row');
  const playedEl = document.getElementById('played-san');
  const evalEl   = document.getElementById('played-eval');
  const bestEl   = document.getElementById('best-san');
  const bestDesc = document.getElementById('best-eval');
  const btnBest  = document.getElementById('btn-best');

  if (moveIdx === 0 || !hist.length) {
    clsRow.style.display  = 'none';
    playedEl.textContent  = '—';
    evalEl.textContent    = 'Select a move to see details.';
    bestEl.textContent    = '—';
    bestDesc.textContent  = '';
    btnBest.style.display = 'none';
    return;
  }

  const i    = moveIdx - 1;
  const cls  = clsArr[i];
  const turn = i % 2 === 0 ? 'White' : 'Black';

  clsRow.style.display = cls ? 'block' : 'none';
  if (cls) clsRow.innerHTML = `<span class="cls-pill cls-${cls}">${cls}</span>`;

  playedEl.textContent = `${turn}: ${hist[i]}`;

  if (evals[i+1]) {
    const ev  = evals[i+1];
    const tmp = new Chess();
    for (let k = 0; k <= i; k++) tmp.move(hist[k]);

    let cpStr;
    if (tmp.in_checkmate()) cpStr = 'Checkmate';
    else if (tmp.in_draw()) cpStr = 'Draw';
    else if (ev.mate !== null) cpStr = 'Mate in ' + Math.abs(ev.mate);
    else {
      const wv = toWhite(ev, tmp.turn()) / 100;
      cpStr = (wv >= 0 ? '+' : '') + wv.toFixed(2);
    }
    evalEl.textContent = `Eval after move: ${cpStr}`;
  } else {
    evalEl.textContent = evals.length > 0 ? 'Evaluating…' : '';
  }

  const posBefore = new Chess();
  for (let k = 0; k < i; k++) posBefore.move(hist[k]);

  if (posBefore.game_over()) {
    bestEl.textContent   = 'Game Over';
    bestDesc.textContent = '';
    btnBest.style.display = 'none';
    return;
  }

  btnBest.style.display = 'block';
  btnBest.textContent   = showBest ? 'Hide Best Move' : 'Show Best Move';

  const bm = evals[i]?.bestMove;
  if (bm && bm !== '(none)' && bm.length >= 4) {
    const t = new Chess(fens[i]);
    let bmSAN = bm.slice(0,2).toUpperCase() + '→' + bm.slice(2,4).toUpperCase();
    try {
      const r = t.move({ from: bm.slice(0,2), to: bm.slice(2,4), promotion: bm[4] || undefined });
      if (r) bmSAN = r.san;
    } catch {}

    bestEl.textContent = `Best: ${bmSAN}`;

    const ev2 = evals[i];
    if (ev2.mate !== null) {
      bestDesc.textContent = `Engine: Mate in ${Math.abs(ev2.mate)}`;
    } else {
      const bvW = toWhite(ev2, turnAt(i)) / 100;
      bestDesc.textContent = `Engine eval: ${bvW >= 0 ? '+' : ''}${bvW.toFixed(2)}`;
    }
  } else {
    bestEl.textContent   = analyzing ? 'Analyzing…' : '—';
    bestDesc.textContent = '';
  }
}

/* ─── Move list ─── */
const BADGE = {
  best:      ['mb-best',      '✓'],
  forced:    ['mb-forced',    '✓'],
  brilliant: ['mb-brilliant', '!!'],
  excellent: ['mb-excellent', '!'],
  good:      ['mb-good',      '↗'],
  inaccuracy:['mb-inaccuracy','?!'],
  mistake:   ['mb-mistake',   '?'],
  blunder:   ['mb-blunder',   '??'],
  missed:    ['mb-missed',    '✗'],
};
function badge(cls) {
  if (!cls) return '';
  const [c, s] = BADGE[cls] || ['mb-good',''];
  return `<span class="mbadge ${c}">${s}</span>`;
}

function updMoveList() {
  const el = document.getElementById('mlist');
  el.innerHTML = '';

  for (let i = 0; i < hist.length; i += 2) {
    const num  = Math.floor(i/2) + 1;
    const wCur = moveIdx === i+1;
    const bCur = moveIdx === i+2;
    const row  = document.createElement('div');
    row.className = 'mrow' + (wCur || bCur ? ' active' : '');
    row.innerHTML = `
      <span class="mnum">${num}.</span>
      <span class="msan${wCur?' cur':''}" onclick="jumpTo(${i+1})">
        ${hist[i]||''}${badge(clsArr[i])}
      </span>
      <span class="msan${bCur?' cur':''}" onclick="jumpTo(${i+2})">
        ${hist[i+1] ? hist[i+1]+badge(clsArr[i+1]) : ''}
      </span>`;
    el.appendChild(row);
  }

  el.querySelector('.msan.cur')?.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

/* ─── Full render ─── */
function render() {
  const boardIdx = (showBest && moveIdx > 0) ? moveIdx - 1 : moveIdx;

  chess = new Chess();
  for (let i = 0; i < boardIdx; i++) chess.move(hist[i]);

  lastMove = null;
  if (boardIdx > 0) {
    const t = new Chess();
    for (let i = 0; i < boardIdx - 1; i++) t.move(hist[i]);
    const r = t.move(hist[boardIdx - 1]);
    if (r) lastMove = { from: r.from, to: r.to };
  }

  renderBoard();
  updEvalBar();
  updQualityPanel();
  updMoveList();
  drawGraph();
}

/* ─── Navigation ─── */
function jumpStart() { exitPractice(); moveIdx = 0;               showBest=false; render(); }
function prevMove()  { exitPractice(); if(moveIdx>0){ moveIdx--;  showBest=false; render(); playNavFeedback(); } }
function nextMove()  { exitPractice(); if(moveIdx<hist.length){ moveIdx++; showBest=false; render(); playNavFeedback(); } }
function jumpEnd()   { exitPractice(); moveIdx = hist.length;      showBest=false; render(); playNavFeedback(); }
function jumpTo(i)   { exitPractice(); moveIdx=Math.max(0,Math.min(hist.length,i)); showBest=false; render(); playNavFeedback(); }
function flipBoard() { flipped=!flipped; renderBoard(); }

function toggleBest() {
  if (moveIdx === 0) return;
  showBest = !showBest;
  render();
}

/* ─── Square clicking & Interactive Practice Mode ─── */
function handleSquareClick(sq) {
  if (analyzing && !practiceMode) return;

  const currentChess = practiceMode ? practiceChess : chess;
  const piece = currentChess.get(sq);

  if (selectedSq === sq) {
    selectedSq = null;
    renderBoard();
    return;
  }

  if (selectedSq) {
    const moves = currentChess.moves({ verbose: true });
    const legalMove = moves.find(m => m.from === selectedSq && m.to === sq);

    if (legalMove) {
      let promotion = undefined;
      const pieceType = currentChess.get(selectedSq)?.type;
      if (pieceType === 'p' && (sq[1] === '8' || sq[1] === '1')) {
        promotion = 'q';
      }

      const playedMove = currentChess.move({
        from: selectedSq,
        to: sq,
        promotion: promotion
      });

      if (playedMove) {
        selectedSq = null;

        let soundName = 'Move';
        if (playedMove.captured) soundName = 'Capture';
        else if (currentChess.in_check()) {
          soundName = currentChess.in_checkmate() ? 'Checkmate' : 'Check';
        }
        snd(soundName);

        if (!practiceMode) {
          const expectedUci = uciMoves[moveIdx];
          const actualUci = playedMove.from + playedMove.to + (playedMove.promotion || '');

          if (actualUci === expectedUci) {
            moveIdx++;
            render();
            const cls = clsArr[moveIdx - 1];
            if (cls) haptic(cls);
            return;
          } else {
            practiceMode = true;
            practiceChess = new Chess(fens[moveIdx]);
            practiceChess.move(playedMove);
          }
        }

        showPracticeBanner();
        renderBoard();
        evalPracticeMove();
        return;
      }
    }
  }

  if (piece && piece.color === currentChess.turn()) {
    selectedSq = sq;
    renderBoard();
  } else {
    selectedSq = null;
    renderBoard();
  }
}

function exitPractice() {
  practiceMode = false;
  practiceChess = null;
  selectedSq = null;
  document.getElementById('practice-banner').style.display = 'none';
  render();
}

function showPracticeBanner() {
  document.getElementById('practice-banner').style.display = 'block';
}

async function evalPracticeMove() {
  if (!practiceChess) return;
  const fen = practiceChess.fen();

  const scoreEl = document.getElementById('eval-score');
  scoreEl.textContent = '...';

  await initWorkers();
  if (sfW.length > 0) {
    const res = await evalPos(sfW[0], fen, 8);
    updatePracticeEvalBar(res, practiceChess.turn());
  }
}

function updatePracticeEvalBar(ev, turn) {
  const scoreEl = document.getElementById('eval-score');
  const fillEl  = document.getElementById('eval-fill');

  const wVal = toWhite(ev, turn);

  let pct, txt;
  if (ev.mate !== null) {
    const wMating = wVal > 0;
    pct = wMating ? 96 : 4;
    const mN = Math.abs(ev.mate);
    txt = wMating ? `M+${mN}` : `M-${mN}`;
    scoreEl.style.color = wMating ? '#f0d9b5' : '#8a8178';
  } else {
    const clampedCp = Math.max(-800, Math.min(800, wVal));
    pct = Math.max(4, Math.min(96, 50 + (clampedCp / 800) * 46));
    const v = wVal / 100;
    txt = (v >= 0 ? '+' : '') + v.toFixed(1);
    scoreEl.style.color = wVal >= 0 ? '#f0d9b5' : '#9a9590';
  }

  fillEl.style.width  = pct + '%';
  scoreEl.textContent = txt;
}

function playNavFeedback() {
  if (moveIdx > 0 && hist[moveIdx - 1]) {
    const san = hist[moveIdx - 1];
    let sndName = 'Move';
    if (san.includes('#')) sndName = 'Checkmate';
    else if (san.includes('+')) sndName = 'Check';
    else if (san.includes('x')) sndName = 'Capture';
    snd(sndName);

    const cls = clsArr[moveIdx - 1];
    if (cls) haptic(cls);
  }
}

/* ─── Keyboard ─── */
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowLeft':  prevMove();  break;
    case 'ArrowRight': nextMove();  break;
    case 'ArrowUp':    jumpStart(); break;
    case 'ArrowDown':  jumpEnd();   break;
  }
});

/* ─── Util ─── */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ─── Initial empty board & Listeners ─── */
renderBoard();
document.getElementById('chessboard').addEventListener('click', e => {
  const sqEl = e.target.closest('.sq');
  if (!sqEl) return;
  const sq = sqEl.dataset.sq;
  if (sq) handleSquareClick(sq);
});
android('onReviewLoaded');
</script>
